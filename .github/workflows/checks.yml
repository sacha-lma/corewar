name: Corewar CI

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - 'no-ga/**'
  pull_request:
    branches-ignore:
      - 'no-ga/**'

env:
  MIRROR_SSH_URL: ${{ vars.MIRROR_SSH_URL }}
  EXECUTABLES: ${{ vars.EXECUTABLES }}

jobs:

  # ─── 1. CODING STYLE + BUILD + BANNED FUNCTIONS ───────────────────────────
  check_compilation_and_coding_style:
    name: Check Compilation and Coding Style
    runs-on: ubuntu-latest
    if: ${{ github.repository != vars.MIRROR_REPOSITORY }}
    container:
      image: epitechcontent/epitest-docker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # --- checkrepo ---
      - name: Run banana-check-repo and capture output
        shell: bash
        run: banana-check-repo 2>&1 | tee /tmp/banana-output.txt || true

      # --- build avec epiclang ---
      - name: Compile with make and capture output
        timeout-minutes: 2
        shell: bash
        env:
          CC: epiclang
        run: |
          make 2>&1 | tee /tmp/make-output.txt
          exit ${PIPESTATUS[0]}

      # --- annotations banana checkrepo ---
      - name: Display banana coding style errors as annotations
        if: always()
        shell: bash
        run: |
          while IFS= read -r line; do
            if echo "$line" | grep -qE '^\./.*: \[Banana\]'; then
              filepath=$(echo "$line" | cut -d':' -f1 | sed 's|^\./||')
              severity=$(echo "$line" | grep -oP '\[Banana\] \[\K[^\]]+')
              code=$(echo "$line" | grep -oP '\(([A-Z0-9-]+)\)' | tr -d '()')
              message=$(echo "$line" | sed 's/.*\[Banana\] \[[A-Za-z]*\] //' | sed 's/ ([A-Z0-9-]*)$//')
              echo "::error file=${filepath},line=1::${severity} coding style error: ${filepath}%0A${code} - ${message}"
            fi
          done < /tmp/banana-output.txt

      # --- annotations epiclang coding style ---
      - name: Display epiclang coding style errors as annotations
        if: always()
        shell: bash
        run: |
          while IFS= read -r line; do
            if echo "$line" | grep -qE '.*\.c:[0-9]+:[0-9]+:.*\[Banana\]'; then
              filepath=$(echo "$line" | cut -d':' -f1)
              lineno=$(echo "$line" | cut -d':' -f2)
              col=$(echo "$line" | cut -d':' -f3)
              severity=$(echo "$line" | grep -oP '\[Banana\] \[\K[^\]]+')
              code=$(echo "$line" | grep -oP '\(([A-Z0-9-]+)\)' | tr -d '()')
              message=$(echo "$line" | sed 's/.*\[Banana\] \[[A-Za-z]*\] //' | sed 's/ ([A-Z0-9-]*)$//')
              echo "::error file=${filepath},line=${lineno},col=${col}::${severity} coding style error: ${filepath}#L${lineno}%0A${code} - ${message}"
            fi
          done < /tmp/make-output.txt

      # --- fail si coding style errors ---
      - name: Fail if any coding style errors exist
        shell: bash
        run: |
          if grep -qE '^\./.*: \[Banana\]' /tmp/banana-output.txt; then
            exit 1
          fi
          if grep -qE '.*\.c:[0-9]+:[0-9]+:.*\[Banana\]' /tmp/make-output.txt; then
            exit 1
          fi

      # --- vérification du binaire corewar ---
      - name: Check binary exists
        shell: bash
        run: |
          if [ ! -f ./corewar ]; then
            echo "::error file=Makefile,title=Missing Binary::corewar binary not found after build"
            exit 1
          fi

      # --- banned functions ---
      - name: Check for banned functions
        shell: bash
        run: |
          WHITELIST="open fopen read fread write fwrite close fclose stat lstat lseek fseek getline malloc realloc free"
          USED=$(nm -u ./corewar 2>/dev/null | awk '{print $NF}' | sed 's/^_//' | grep -v '^$' | sort -u)
          BANNED=""
          for sym in $USED; do
            found=0
            for allowed in $WHITELIST; do
              [ "$sym" = "$allowed" ] && found=1 && break
            done
            case "$sym" in __*|_IO_*|stderr|stdout|stdin) found=1 ;; esac
            [ "$found" -eq 0 ] && BANNED="$BANNED $sym"
          done
          if [ -n "$BANNED" ]; then
            for b in $BANNED; do
              echo "::error title=Banned Function::$b is not in the authorized functions list"
            done
            exit 1
          fi

      # --- fonctions superflues ---
      - name: Check for unused functions
        shell: bash
        env:
          CC: epiclang
        run: |
          make fclean > /dev/null 2>&1 || true
          make CFLAGS="-Wall -Wextra -Werror -Wunused-function" 2>&1 | tee /tmp/unused.log || true
          if grep -q "unused-function\|defined but not used" /tmp/unused.log; then
            grep "unused-function\|defined but not used" /tmp/unused.log | while IFS= read -r line; do
              FILE=$(echo "$line" | cut -d':' -f1)
              LINE=$(echo "$line" | cut -d':' -f2)
              MSG=$(echo "$line" | sed -E 's/^[^:]+:[0-9]+:[0-9]+:[[:space:]]*(warning):[[:space:]]*//')
              echo "::error file=$FILE,line=$LINE,title=Unused Function::$MSG"
            done
            exit 1
          fi

      # --- fclean final ---
      - name: Clean all build artifacts
        run: make fclean

  # ─── 2. MIRROR ────────────────────────────────────────────────────────────
  push_to_mirror:
    name: Push to Mirror Repository
    runs-on: ubuntu-latest
    needs: check_compilation_and_coding_style
    if: ${{ !cancelled() && github.event_name == 'push' && github.repository != vars.MIRROR_REPOSITORY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Mirror to Epitech repository
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ env.MIRROR_SSH_URL }}
          ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}
