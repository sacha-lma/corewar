name: Corewar CI

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - "no-ga/**"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches-ignore:
      - "no-ga/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MIRROR_SSH_URL: ${{ vars.MIRROR_SSH_URL }}
  PRIVATE_SSH_KEY: ${{ secrets.PRIVATE_SSH_KEY }}

jobs:

  # ─── 0. CHECK MIRROR ──────────────────────────────────────────────────────
  check_mirror:
    runs-on: ubuntu-latest
    outputs:
      is_mirror: ${{ steps.check.outputs.is_mirror }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        run: |
          ORIGIN=$(git remote get-url origin)
          ORIGIN=$(echo $ORIGIN | sed 's|https://github.com|git@github.com:|; s|$|.git|')
          ORIGIN=$(echo $ORIGIN | sed 's/com:\//com:/')
          echo "is_mirror=$( [ "$ORIGIN" = "$MIRROR_SSH_URL" ] && echo true || echo false )" >> $GITHUB_OUTPUT

  # ─── 1. CODING STYLE + BUILD + CHECKREPO + BANNED FUNCTIONS ───────────────
  check_compilation_and_coding_style:
    name: Coding Style, Build & Check Repo
    needs: check_mirror
    if: needs.check_mirror.outputs.is_mirror == 'false'
    runs-on: ubuntu-latest
    container:
      image: lukassgx/epigambling

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- checkrepo ---
      - name: Check Repository Structure
        continue-on-error: true
        run: banana-check-repo > banana-check-repo.log || true

      - name: Annotate Coding Style Infractions (repo structure)
        run: |
          if [ -s banana-check-repo.log ]; then
            grep "\[Banana\]" banana-check-repo.log | while IFS= read -r line; do
              FILE=$(echo "$line" | cut -d':' -f1 | sed 's|^\./||')
              LINE=$(echo "$line" | cut -d':' -f2)
              [ "$LINE" -eq "$LINE" ] 2>/dev/null || LINE=1
              [ "$LINE" -le 0 ] && LINE=1
              LEVEL=$(echo "$line" | sed -n 's/.*\[Banana\] \[\([^]]*\)\].*/\1/p')
              CODE=$(echo "$line" | sed -n 's/.*(\([^)]*\)).*/\1/p')
              MSG=$(echo "$line" | sed -E 's/.*\] (.*) \(.*\)/\1/')
              echo "::error file=$FILE,line=$LINE,title=$LEVEL coding style error::$CODE - $MSG"
            done
            exit 1
          fi

      # --- build ---
      - name: Build (epiclang / make)
        run: make 2>&1 | tee build.log
        timeout-minutes: 2

      # --- warnings/errors depuis le build ---
      - name: Check build for warnings and errors
        run: |
          if grep -Eq "error:|warning:" build.log; then
            grep -E "error:|warning:" build.log | while IFS= read -r line; do
              FILE=$(echo "$line" | cut -d':' -f1)
              LINE=$(echo "$line" | cut -d':' -f2)
              [ "$LINE" -eq "$LINE" ] 2>/dev/null || LINE=1
              [ "$LINE" -le 0 ] && LINE=1
              LEVEL=$(echo "$line" | sed -nE 's/.*\b(error|warning):.*/\1/p')
              CODE=$(echo "$line" | sed -nE 's/.*\(([^()]*)\)[[:space:]]*$/\1/p')
              [ -z "$CODE" ] && CODE=compiler
              MSG=$(echo "$line" | sed -E 's/^[^:]+:[0-9]+:[0-9]+:[[:space:]]*(error|warning):[[:space:]]*//')
              echo "::error file=$FILE,line=$LINE,title=$LEVEL::$CODE - $MSG"
            done
            exit 1
          fi

      # --- vérification que le binaire corewar existe ---
      - name: Check binary exists
        run: |
          if [ ! -f ./corewar ]; then
            echo "::error file=Makefile,title=Missing Binary::corewar binary not found after build"
            exit 1
          fi

      # --- banned functions ---
      - name: Check for banned functions
        run: |
          WHITELIST="open fopen read fread write fwrite close fclose stat lstat lseek fseek getline malloc realloc free"
          USED=$(nm -u ./corewar 2>/dev/null | awk '{print $NF}' | sed 's/^_//' | grep -v '^$' | sort -u)
          BANNED=""
          for sym in $USED; do
            found=0
            for allowed in $WHITELIST; do
              [ "$sym" = "$allowed" ] && found=1 && break
            done
            case "$sym" in __*|_IO_*|_ITM_*|ITM_*|_cxa_*|_libc_*|_register_*|_deregister_*|stderr|stdout|stdin) found=1 ;; esac
            [ "$found" -eq 0 ] && BANNED="$BANNED $sym"
          done
          if [ -n "$BANNED" ]; then
            for b in $BANNED; do
              echo "::error title=Banned Function::$b is not in the authorized functions list"
            done
            exit 1
          fi

      # --- fonctions superflues ---
      - name: Check for unused functions
        run: |
          make fclean > /dev/null 2>&1 || true
          make CFLAGS="-Wall -Wextra -Werror -Wunused-function" 2>&1 | tee unused.log || true
          if grep -q "unused-function\|defined but not used" unused.log; then
            grep "unused-function\|defined but not used" unused.log | while IFS= read -r line; do
              FILE=$(echo "$line" | cut -d':' -f1)
              LINE=$(echo "$line" | cut -d':' -f2)
              MSG=$(echo "$line" | sed -E 's/^[^:]+:[0-9]+:[0-9]+:[[:space:]]*(warning):[[:space:]]*//')
              echo "::error file=$FILE,line=$LINE,title=Unused Function::$MSG"
            done
            exit 1
          fi

      - name: Cleanup
        run: make fclean

  # ─── 2. MIRROR ────────────────────────────────────────────────────────────
  push_to_mirror:
    name: Mirror to remote repository
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs:
      - check_mirror
      - check_compilation_and_coding_style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ vars.MIRROR_SSH_URL }}
          ssh_private_key: ${{ secrets.PRIVATE_SSH_KEY }}
          ssh_username: git
